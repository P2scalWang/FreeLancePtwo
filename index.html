    <!-- Firebase SDK (คงเดิม) -->
    <script type="module">

        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    <style>
        :root {
            /* Neo-Brutalist Palette */
            --bg-paper: #fffef2;
            --c-black: #1a1a1a;
            --c-white: #ffffff;
            --c-yellow: #FFDE59;
            --c-blue: #5CE1E6;
            --c-pink: #FF66C4;
            --c-green: #7ED957;
            --c-purple: #8b5cf6; /* ปรับสีม่วงให้เหมือนในกราฟ */
            
            --border-thick: 3px solid var(--c-black);
            --border-thin: 2px solid var(--c-black);
            --shadow-hard: 6px 6px 0px 0px var(--c-black);
            
            --font-head: 'Chakra Petch', sans-serif;
            --font-body: 'Kanit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-paper);
            background-image: radial-gradient(var(--c-black) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--c-black);
            font-family: var(--font-body);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .wrapper { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header-box {
            background: var(--c-white);
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand-title {
            font-family: var(--font-head);
            font-weight: 700;
            font-size: 1.8rem;
            text-transform: uppercase;
            background: var(--c-yellow);
            padding: 5px 15px;
            border: var(--border-thin);
            transform: rotate(-2deg);
        }

        .year-scroller { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .year-tag {
            background: var(--c-white); border: var(--border-thin); padding: 5px 15px;
            font-family: var(--font-head); font-weight: 600; cursor: pointer;
            transition: all 0.2s; box-shadow: 2px 2px 0 var(--c-black);
        }
        .year-tag.active { background: var(--c-black); color: var(--c-white); transform: translate(2px, 2px); box-shadow: none; }

        /* Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-bottom: 30px; }
        
        /* Card Styles */
        .brutal-card {
            background: var(--c-white); border: var(--border-thick);
            box-shadow: var(--shadow-hard); padding: 20px;
            position: relative; transition: transform 0.2s;
        }
        .brutal-card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px 0px var(--c-black); }

        .card-label { font-family: var(--font-head); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .card-value { font-family: var(--font-head); font-weight: 700; font-size: 2rem; line-height: 1; }

        .box-total { grid-column: span 8; background: var(--c-blue); }
        .box-latest { grid-column: span 4; background: var(--c-pink); display: flex; flex-direction: column; justify-content: center; text-align: center; border-radius: 50% 50% 0 0; }
        .box-stat { grid-column: span 4; }
        .box-goal { grid-column: span 12; background: var(--c-black); color: var(--c-white); }

        /* Chart Section - Modified for Dark Theme to match image */
        .chart-window {
            grid-column: span 12;
            background: #111; /* Dark background as per image */
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            color: white;
            overflow: hidden;
        }

        .window-header {
            background: #000;
            color: var(--c-white);
            padding: 10px 15px;
            font-family: var(--font-head);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        
        .window-controls { display: flex; gap: 5px; }
        .win-dot { width: 12px; height: 12px; border-radius: 50%; }

        .chart-body { padding: 20px; height: 400px; background: #0f1014; /* Deep dark bg */ }

        /* Goal & Input */
        .retro-progress-container { width: 100%; height: 30px; border: 2px solid var(--c-white); margin: 15px 0; background: #333; }
        .retro-bar { height: 100%; background: repeating-linear-gradient(45deg, var(--c-green), var(--c-green) 10px, #6bc945 10px, #6bc945 20px); width: 0%; transition: width 1s; border-right: 2px solid var(--c-white); }
        
        .goal-input-group { display: flex; gap: 10px; margin-top: 15px; }
        .ugly-input { flex: 1; background: var(--c-white); border: var(--border-thin); padding: 10px; font-family: var(--font-head); font-size: 1rem; outline: none; }
        .ugly-btn { background: var(--c-yellow); border: var(--border-thin); padding: 0 20px; font-family: var(--font-head); font-weight: 700; cursor: pointer; box-shadow: 4px 4px 0 var(--c-white); }
        .ugly-btn:active { box-shadow: none; transform: translate(4px, 4px); }

        /* Table */
        .table-section { grid-column: span 12; background: var(--c-white); border: var(--border-thick); box-shadow: var(--shadow-hard); }
        .brutal-table { width: 100%; border-collapse: collapse; }
        .brutal-table th { background: var(--c-black); color: var(--c-white); padding: 15px; font-family: var(--font-head); text-align: left; }
        .brutal-table td { padding: 15px; border: 2px solid var(--c-black); font-weight: 600; }
        .brutal-table tr:hover { background: var(--c-yellow); }

        /* FAB */
        .sticker-fab { position: fixed; bottom: 30px; right: 30px; background: var(--c-pink); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: var(--border-thick); box-shadow: var(--shadow-hard); cursor: pointer; z-index: 100; transform: rotate(10deg); transition: 0.2s; }
        .sticker-fab:hover { transform: rotate(0deg) scale(1.1); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; place-items: center; z-index: 200; }
        .modal-overlay.active { display: grid; }
        .modal-window { background: var(--c-white); border: var(--border-thick); box-shadow: 10px 10px 0 var(--c-pink); width: 90%; max-width: 400px; }
        .modal-content { padding: 20px; }
        .modal-title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; background: var(--c-yellow); display: inline-block; padding: 5px 10px; border: var(--border-thin); margin-bottom: 20px; }

        /* Toast & Loading */
        .brutal-toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px); background: var(--c-black); color: var(--c-white); padding: 15px 30px; border: 2px solid var(--c-white); font-family: var(--font-head); z-index: 300; transition: 0.3s; }
        .brutal-toast.show { transform: translate(-50%, 0); }
        
        #loading.active { display: grid; }
        
        /* Helper for details */
        .detail-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--c-black); background: #fff; }
        .detail-item:nth-child(odd) { background: #f0f0f0; }
        .detail-list { max-height: 200px; overflow-y: auto; border: var(--border-thin); }

        @media (max-width: 768px) {
            .bento-grid { display: flex; flex-direction: column; }
            .box-latest { border-radius: 0; border: var(--border-thick); }
        }
    </style>
</head>

    <style>@keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.2;} 100% {opacity: 1;} }</style>

    <script>
        function initDashboard() {
            const firebase = window.firebase;
            const db = firebase.db;
            const dbRef = firebase.ref;
            const dbSet = firebase.set;
            const dbPush = firebase.push;
            const dbOnValue = firebase.onValue;

            let dashboardData = null;
            let currentYear = new Date().getFullYear() + 543;
            let myChart = null;
            let currentGoal = 0;

            function processFirebaseData(snapshot) {
                if (!snapshot.exists()) return { years: [], monthly: [], goal: null };
                const data = snapshot.val();
                let goal = (data.goal && data.goal.value !== undefined) ? parseFloat(data.goal.value) : null;
                const freelanceRecords = [];
                if (data.income) {
                    Object.keys(data.income).forEach(key => {
                        const record = data.income[key];
                        if (record.date && record.money) {
                            freelanceRecords.push({ Date: record.date, Money: record.money, createdAt: record.timestamp || key });
                        }
                    });
                }
                const yearSet = new Set();
                const monthlyMap = {};
                freelanceRecords.forEach(record => {
                    const amount = parseFloat(String(record.Money).replace(/,/g, '')) || 0;
                    const dateParts = record.Date.split('/');
                    if (dateParts.length !== 3) return;
                    let year = parseInt(dateParts[2]);
                    if (year < 2400) year += 543;
                    yearSet.add(year);
                    const monthKey = `${year}-${parseInt(dateParts[1])}`;
                    if (!monthlyMap[monthKey]) {
                        monthlyMap[monthKey] = {
                            year: year, month: parseInt(dateParts[1]), monthName: getThaiMonthName(parseInt(dateParts[1])),
                            total: 0, count: 0, days: []
                        };
                    }
                    monthlyMap[monthKey].total += amount;
                    monthlyMap[monthKey].count++;
                    monthlyMap[monthKey].days.push({ day: parseInt(dateParts[0]), amount: amount, createdAt: record.createdAt });
                });
                const years = Array.from(yearSet).sort((a, b) => b - a);
                const monthly = Object.values(monthlyMap).sort((a, b) => (b.year - a.year) || (b.month - a.month));
                return { years, monthly, goal };
            }

            function getThaiMonthName(month) {
                const names = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                return names[month - 1] || '';
            }

            window.addEventListener('load', () => {
                const today = new Date();
                document.getElementById('incomeDate').value = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear() + 543}`;
                loadData();
            });

            function loadData() {
                showLoading(true);
                try {
                    dbOnValue(dbRef(db, 'freelance-income'), (snapshot) => {
                        const result = processFirebaseData(snapshot);
                        dashboardData = { years: result.years, monthly: result.monthly };
                        if (result.goal) { currentGoal = result.goal; document.getElementById('goalInput').value = currentGoal; }
                        setupYearTabs(result.years);
                        if (result.years.length > 0) {
                            if (!result.years.includes(currentYear)) currentYear = result.years[0];
                            renderDashboard(currentYear);
                        }
                        showLoading(false);
                    });
                } catch (error) { showToast('Error: ' + error.message); showLoading(false); }
            }

            function setupYearTabs(years) {
                const container = document.getElementById('yearFilter');
                container.innerHTML = years.map(y => `<div class="year-tag ${y === currentYear ? 'active' : ''}" onclick="switchYear(${y})">${y}</div>`).join('');
            }

            function switchYear(year) {
                currentYear = year;
                document.querySelectorAll('.year-tag').forEach(el => el.classList.toggle('active', parseInt(el.innerText) === year));
                renderDashboard(year);
            }

            function renderDashboard(year) {
                if (!dashboardData) return;
                const yearData = dashboardData.monthly.filter(m => m.year === year);
                const total = yearData.reduce((sum, m) => sum + m.total, 0);
                const avg = yearData.length ? total / yearData.length : 0;
                const best = yearData.reduce((max, m) => m.total > max.total ? m : max, { total: 0, monthName: '-' });

                document.getElementById('heroTotal').innerText = formatMoney(total);
                document.getElementById('heroYear').innerText = year;
                document.getElementById('totalIncome').innerText = formatMoney(total);
                document.getElementById('avgIncome').innerText = formatMoney(avg);
                document.getElementById('bestMonth').innerText = formatMoney(best.total);
                document.getElementById('bestMonthName').innerText = best.monthName;

                renderChart(yearData, avg);
                renderTable(yearData, avg);
                updateGoalProgress(total);
                updateLatestIncome();
            }

            function updateLatestIncome() {
                if (!dashboardData?.monthly?.length) { document.getElementById('latestIncomeAmount').innerText = '฿0'; return; }
                let allDays = [];
                dashboardData.monthly.forEach(m => m.days.forEach(d => allDays.push({ ...d, month: m.month, year: m.year })));
                if (!allDays.length) return;
                
                allDays.sort((a, b) => {
                    if (a.createdAt && b.createdAt) return new Date(b.createdAt) - new Date(a.createdAt);
                    return new Date(b.year-543, b.month-1, b.day) - new Date(a.year-543, a.month-1, a.day);
                });
                const latest = allDays[0];
                document.getElementById('latestIncomeAmount').innerText = formatMoney(latest.amount);
                document.getElementById('latestIncomeDate').innerText = `${latest.day}/${latest.month}/${latest.year}`;
            }

            // ---------------------------------------------------------
            // UPDATED: Chart to match the specific image style
            // ---------------------------------------------------------
            function renderChart(monthlyData, averageValue) {
                const ctx = document.getElementById('incomeChart').getContext('2d');
                const incomeValues = new Array(12).fill(0);
                monthlyData.forEach(m => incomeValues[m.month - 1] = m.total);
                
                if (myChart) myChart.destroy();
                
                // Gradient for the area fill (Purple fading to transparent)
                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, 'rgba(139, 92, 246, 0.4)'); // Purple with opacity
                gradient.addColorStop(1, 'rgba(139, 92, 246, 0.0)'); // Transparent

                Chart.defaults.font.family = "'Kanit', sans-serif";
                
                myChart = new Chart(ctx, {
                    type: 'line', // Changed to Line Chart
                    data: {
                        labels: ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'],
                        datasets: [{
                            label: 'INCOME',
                            data: incomeValues,
                            borderColor: '#8b5cf6', // Neon Purple Line
                            borderWidth: 3,
                            backgroundColor: gradient, // Gradient Area
                            fill: true,
                            tension: 0.4, // Smooth Curve
                            pointBackgroundColor: '#ffffff', // White dots
                            pointBorderColor: '#8b5cf6', // Purple border on dots
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                titleColor: '#000',
                                bodyColor: '#000',
                                titleFont: { weight: 'bold' },
                                padding: 10,
                                cornerRadius: 4,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return '฿' + context.parsed.y.toLocaleString();
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { 
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }, // Faint grid lines
                                beginAtZero: true,
                                ticks: { 
                                    color: '#a1a1aa', // Grey text
                                    font: { size: 10 }
                                },
                                border: { display: false }
                            },
                            x: { 
                                grid: { display: false },
                                ticks: { 
                                    color: '#a1a1aa', // Grey text
                                    font: { size: 10, weight: 'bold' }
                                },
                                border: { display: false }
                            }
                        }
                    }
                });
            }
            // ---------------------------------------------------------

            function renderTable(data, avg) {
                const tbody = document.getElementById('monthlyTable');
                let html = '';
                [...data].sort((a, b) => b.month - a.month).forEach(m => {
                    const diff = m.total - avg;
                    const percent = avg > 0 ? ((diff / avg) * 100).toFixed(0) : 0;
                    const icon = diff >= 0 ? '▲' : '▼';
                    const color = diff >= 0 ? '#7ED957' : '#FF66C4';
                    html += `<tr onclick='openMonthDetailModal(${JSON.stringify(m)})' style="cursor: pointer;"><td>${m.monthName}</td><td>${formatMoney(m.total)}</td><td style="color: ${color}; font-weight: 800;">${icon} ${Math.abs(percent)}%</td></tr>`;
                });
                tbody.innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding: 20px;">NO DATA</td></tr>';
            }

            function openMonthDetailModal(monthData) {
                document.getElementById('monthDetailTitle').innerText = `${monthData.monthName} ${monthData.year}`;
                const total = monthData.total;
                const workDays = monthData.days.length;
                document.getElementById('monthTotalIncome').innerText = formatMoney(total);
                document.getElementById('monthWorkDays').innerText = workDays;
                document.getElementById('monthAvgPerDay').innerText = formatMoney(workDays ? total / workDays : 0);
                document.getElementById('monthMaxDay').innerText = formatMoney(monthData.days.reduce((m, d) => Math.max(m, d.amount), 0));
                const tbody = document.getElementById('dailyTableBody');
                tbody.innerHTML = [...monthData.days].sort((a, b) => b.day - a.day).map(d => `<li class="detail-item"><span>Day ${d.day}</span><span style="font-weight: 700;">${formatMoney(d.amount)}</span></li>`).join('');
                document.getElementById('monthDetailModal').classList.add('active');
            }

            async function setGoal() {
                const val = parseFloat(document.getElementById('goalInput').value);
                if (isNaN(val) || val <= 0) return showToast('INVALID INPUT');
                try { await dbSet(dbRef(db, 'freelance-income/goal'), { value: val }); currentGoal = val; updateGoalProgress(); showToast('TARGET UPDATED'); } catch (e) { showToast(e.message); }
            }

            function updateGoalProgress(currentAmount) {
                if (!currentGoal) return;
                if (currentAmount === undefined) currentAmount = parseFloat(document.getElementById('totalIncome').innerText.replace(/[^\d.]/g, '')) || 0;
                const percent = Math.min(100, (currentAmount / currentGoal) * 100);
                const remaining = Math.max(0, currentGoal - currentAmount);
                document.getElementById('gaugeProgress').style.width = percent + '%';
                document.getElementById('heroGoal').innerText = percent.toFixed(0) + '%';
                document.getElementById('goalTargetDisplay').innerText = formatMoney(currentGoal);
                document.getElementById('goalRemainingDisplay').innerText = remaining > 0 ? formatMoney(remaining) : 'DONE!';
            }

            async function submitIncome() {
                const dateVal = document.getElementById('incomeDate').value;
                const amountVal = document.getElementById('incomeAmount').value;
                if (!dateVal || !amountVal) return showToast('MISSING DATA');
                try {
                    await dbSet(dbPush(dbRef(db, 'freelance-income/income')), { date: dateVal, money: parseFloat(amountVal), timestamp: new Date().toISOString() });
                    showToast('CASH ADDED!'); document.getElementById('incomeAmount').value = ''; closeAddIncomeModal();
                } catch (e) { showToast(e.message); }
            }

            function formatMoney(n) { return '฿' + (n || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
            function showToast(msg) { const t = document.getElementById('toast'); t.classList.add('show'); document.getElementById('toastMessage').innerText = msg; setTimeout(() => t.classList.remove('show'), 3000); }
            function showLoading(show) { const el = document.getElementById('loading'); if (show) el.classList.add('active'); else el.classList.remove('active'); }

            window.switchYear = switchYear; window.openMonthDetailModal = openMonthDetailModal;
            window.closeMonthDetailModal = () => document.getElementById('monthDetailModal').classList.remove('active');
            window.setGoal = setGoal; window.openAddIncomeModal = () => document.getElementById('addIncomeModal').classList.add('active');
            window.closeAddIncomeModal = () => document.getElementById('addIncomeModal').classList.remove('active');
            window.submitIncome = submitIncome;
        }

        if (window.firebaseReady) initDashboard(); else window.addEventListener('firebase-ready', initDashboard);
    </script>
</body>
</html>
